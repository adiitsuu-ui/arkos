name: Mobile Build

on:
  push:
    branches: [main, "feature/**"]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "mobile/**"
  workflow_dispatch:

jobs:
  # ── Android APK / AAB ───────────────────────────────────────────────────────
  android:
    name: Android
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.x"
          channel: stable
          cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust targets
        uses: actions/cache@v4
        with:
          path: |
            mobile/native/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-android-${{ hashFiles('mobile/native/Cargo.lock', 'mobile/native/Cargo.toml') }}
          restore-keys: rust-android-

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Set up Android NDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK r26
        run: sdkmanager "ndk;26.1.10909125"

      - name: Build Rust native library (Android)
        working-directory: mobile
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_LATEST_HOME }}
        run: ./scripts/build_native_android.sh --release

      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: Build APK (release)
        working-directory: mobile
        run: flutter build apk --release --split-per-abi

      - name: Build App Bundle (release)
        working-directory: mobile
        run: flutter build appbundle --release

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: mobile/build/app/outputs/flutter-apk/*.apk
          retention-days: 14

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: mobile/build/app/outputs/bundle/release/*.aab
          retention-days: 14

  # ── iOS ─────────────────────────────────────────────────────────────────────
  ios:
    name: iOS
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.x"
          channel: stable
          cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust targets
        uses: actions/cache@v4
        with:
          path: |
            mobile/native/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-ios-${{ hashFiles('mobile/native/Cargo.lock', 'mobile/native/Cargo.toml') }}
          restore-keys: rust-ios-

      - name: Build Rust native library (iOS)
        working-directory: mobile
        run: ./scripts/build_native_ios.sh --release

      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: Build iOS (no codesign)
        working-directory: mobile
        run: flutter build ios --release --no-codesign

      - name: Upload iOS app
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: mobile/build/ios/iphoneos/Runner.app
          retention-days: 14
